; =============================================================================
; sleep_watchdog — Phase 4 验收示例
; 验收：WDT 重启计数正确、deep sleep 前 config 不丢、modem sleep 恢复
; 硬件：GPIO16 连接 RST（deep sleep 唤醒必须）
; =============================================================================

[platformio]
default_envs = esp12f

[env:esp12f]
platform       = espressif8266
board          = esp12e
framework      = arduino
monitor_speed  = 115200
upload_speed   = 460800
lib_extra_dirs = ../..
board_build.ldscript = ../../partitions/esp8266-4mb-2mfs.ld
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_DEFAULT_HOSTNAME=\"esp8266base-sleep\"
    -DESP8266BASE_USE_WEB=0
    -DESP8266BASE_USE_OTA=0
    -DESP8266BASE_USE_NTP=0
    -DESP8266BASE_USE_MDNS=0
    -DESP8266BASE_USE_SLEEP=1
    -DESP8266BASE_USE_WATCHDOG=1
    -DESP8266BASE_WDT_TIMEOUT_MS=2500

[env:nodemcuv2]
platform       = espressif8266
board          = nodemcuv2
framework      = arduino
monitor_speed  = 115200
lib_extra_dirs = ../..
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_DEFAULT_HOSTNAME=\"esp8266base-sleep\"
    -DESP8266BASE_USE_WEB=0
    -DESP8266BASE_USE_OTA=0
    -DESP8266BASE_USE_NTP=0
    -DESP8266BASE_USE_MDNS=0
    -DESP8266BASE_USE_SLEEP=1
    -DESP8266BASE_USE_WATCHDOG=1
