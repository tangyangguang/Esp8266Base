; =============================================================================
; full_demo — 全模块演示
; 使用所有模块：Log / Config / WiFi / Web / OTA / NTP / mDNS / Sleep / Watchdog
;
; 首次烧录后设备进入 AP 模式：
;   SSID:     ESP8266-Config-XXXX（无密码）
;   配网地址:  http://192.168.4.1/
;   认证:     admin / esp8266
;
; 配置 WiFi 后可通过 mDNS 访问：http://esp-demo.local/
; =============================================================================

[platformio]
default_envs = esp12f

[env:esp12f]
platform              = espressif8266
board                 = esp12e
framework             = arduino
monitor_speed         = 115200
upload_speed          = 460800
lib_extra_dirs        = ../..
board_build.ldscript  = ../../partitions/esp8266-4mb-2mfs.ld
lib_deps              = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=0
    -DESP8266BASE_WEB_AUTH_USER=\"admin\"
    -DESP8266BASE_WEB_AUTH_PASS=\"esp8266\"
    -DESP8266BASE_WDT_TIMEOUT_MS=2500
    -DESP8266BASE_NTP_TIMEZONE=28800
