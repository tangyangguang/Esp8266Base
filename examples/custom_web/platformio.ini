; =============================================================================
; custom_web — 自定义 Web 页面示例（Phase 2）
; 演示：注册页面/API、PROGMEM HTML、分段输出、Basic Auth
; =============================================================================

[platformio]
default_envs = esp12f

[env:esp12f]
platform       = espressif8266
board          = esp12e
framework      = arduino
monitor_speed  = 115200
upload_speed   = 460800
lib_extra_dirs = ../..
board_build.ldscript = ../../partitions/esp8266-4mb-2mfs.ld
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=1
    -DESP8266BASE_USE_OTA=0
    -DESP8266BASE_USE_NTP=0
    -DESP8266BASE_USE_MDNS=1
    -DESP8266BASE_USE_SLEEP=0
    -DESP8266BASE_USE_WATCHDOG=1
    -DESP8266BASE_WEB_MAX_APP_PAGES=4
    -DESP8266BASE_WEB_MAX_APP_APIS=6
    -DESP8266BASE_WEB_AUTH_USER=\"admin\"
    -DESP8266BASE_WEB_AUTH_PASS=\"esp8266\"

[env:nodemcuv2]
platform       = espressif8266
board          = nodemcuv2
framework      = arduino
monitor_speed  = 115200
lib_extra_dirs = ../..
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=1
    -DESP8266BASE_USE_OTA=0
    -DESP8266BASE_USE_NTP=0
    -DESP8266BASE_USE_MDNS=1
    -DESP8266BASE_USE_SLEEP=0
    -DESP8266BASE_USE_WATCHDOG=1
