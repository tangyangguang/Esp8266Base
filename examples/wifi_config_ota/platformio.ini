; =============================================================================
; wifi_config_ota — Phase 2 验收示例
; 验收：Web 修改 WiFi、OTA 上传固件、free heap >= 12KB（OTA 中）
; =============================================================================

[platformio]
default_envs = esp12f

[env:esp12f]
platform       = espressif8266
board          = esp12e
framework      = arduino
monitor_speed  = 115200
upload_speed   = 460800
lib_extra_dirs = ../..
board_build.ldscript = ../../partitions/esp8266-4mb-2mfs.ld
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=1
    -DESP8266BASE_USE_OTA=1
    -DESP8266BASE_USE_NTP=1
    -DESP8266BASE_USE_MDNS=1
    -DESP8266BASE_USE_SLEEP=0
    -DESP8266BASE_USE_WATCHDOG=1
    -DESP8266BASE_WEB_AUTH_USER=\"admin\"
    -DESP8266BASE_WEB_AUTH_PASS=\"esp8266\"

[env:nodemcuv2]
platform       = espressif8266
board          = nodemcuv2
framework      = arduino
monitor_speed  = 115200
lib_extra_dirs = ../..
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=1
    -DESP8266BASE_USE_OTA=1
    -DESP8266BASE_USE_NTP=1
    -DESP8266BASE_USE_MDNS=1
    -DESP8266BASE_USE_SLEEP=0
    -DESP8266BASE_USE_WATCHDOG=1
