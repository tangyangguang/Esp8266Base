; =============================================================================
; basic_wifi — Phase 1 验收示例
; 验收：能保存凭证、重启自动连接 STA、无业务时 free heap >= 28KB
; =============================================================================

[platformio]
default_envs = esp12f

[env:esp12f]
platform       = espressif8266
board          = esp12e
framework      = arduino
monitor_speed  = 115200
upload_speed   = 460800

; 引用父目录（库根目录）作为本地库
lib_extra_dirs = ../..

; 4MB Flash + 2MB LittleFS 分区
board_build.ldscript = ../../partitions/esp8266-4mb-2mfs.ld

lib_deps =
    LittleFS

build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=0
    -DESP8266BASE_USE_OTA=0
    -DESP8266BASE_USE_NTP=0
    -DESP8266BASE_USE_MDNS=0
    -DESP8266BASE_USE_SLEEP=0
    -DESP8266BASE_USE_WATCHDOG=0
    -DESP8266BASE_WIFI_CONNECT_TIMEOUT=20000
    -DESP8266BASE_WIFI_RETRY_FAST=2000
    -DESP8266BASE_WIFI_RETRY_SLOW=60000

[env:nodemcuv2]
platform       = espressif8266
board          = nodemcuv2
framework      = arduino
monitor_speed  = 115200
lib_extra_dirs = ../..
lib_deps       = LittleFS
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=0
    -DESP8266BASE_USE_OTA=0
    -DESP8266BASE_USE_NTP=0
    -DESP8266BASE_USE_MDNS=0
    -DESP8266BASE_USE_SLEEP=0
    -DESP8266BASE_USE_WATCHDOG=0
