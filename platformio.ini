; =============================================================================
; Esp8266Base — 根项目 platformio.ini
;
; 用 full_demo 作为根项目烟测入口，并把仓库根目录作为本地库依赖。
; 各示例有独立的 platformio.ini（位于 examples/<name>/platformio.ini）。
; =============================================================================

[platformio]
default_envs = esp12f
src_dir = examples/full_demo/src

; ---- 公共配置 ----
[env_base]
platform       = espressif8266
framework      = arduino
monitor_speed  = 115200
upload_speed   = 460800
lib_extra_dirs = .

; Phase 1 编译配置
build_flags =
    -DESP8266BASE_LOG_LEVEL=1
    -DESP8266BASE_USE_WEB=1
    -DESP8266BASE_USE_OTA=1
    -DESP8266BASE_USE_NTP=1
    -DESP8266BASE_USE_MDNS=1
    -DESP8266BASE_USE_SLEEP=1
    -DESP8266BASE_USE_WATCHDOG=1
    -DESP8266BASE_CFG_DEFERRED_SIZE=4
    -DESP8266BASE_WEB_MAX_APP_PAGES=4
    -DESP8266BASE_WEB_MAX_APP_APIS=6
    -DESP8266BASE_WEB_AUTH_USER=\"admin\"
    -DESP8266BASE_WEB_AUTH_PASS=\"esp8266\"
    -DESP8266BASE_NTP_TIMEZONE=28800
    -DESP8266BASE_WDT_TIMEOUT_MS=2500
    -DESP8266BASE_WIFI_CONNECT_TIMEOUT=20000
    -DESP8266BASE_WIFI_RETRY_FAST=15000
    -DESP8266BASE_WIFI_RETRY_SLOW=60000

lib_deps =
    LittleFS

; ---- ESP-12F / ESP-12E（推荐，4MB Flash） ----
[env:esp12f]
extends              = env_base
board                = esp12e
board_build.ldscript = partitions/esp8266-4mb-2mfs.ld

; ---- NodeMCU v2（开发调试用） ----
[env:nodemcuv2]
extends = env_base
board   = nodemcuv2
; NodeMCU 默认 4MB Flash，使用内置 eagle.flash.4m2m.ld
